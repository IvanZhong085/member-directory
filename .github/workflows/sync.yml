# 每次 data.js 發布後自動:內嵌照片轉實體檔 → 重建成員分享頁 → 更新名冊 roster.csv
# 由 GITHUB_TOKEN 提交,不會觸發其他 workflow(GitHub 預設防迴圈)。
name: 同步網站資料
on:
  push:
    branches: [main]
    paths: [data.js]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 內嵌照片轉實體圖檔
        run: node tools/extract-inline-photos.mjs

      - name: 重建成員分享預覽頁
        run: node tools/build-member-pages.mjs

      - name: 更新名冊 roster.csv
        run: node tools/build-roster.mjs

      - name: 有變更才提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "沒有變更,不需提交。"
          else
            git commit -m "自動同步:照片正規化/分享頁/名冊 CSV"
            git push
          fi
