<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產業小組表｜會員名錄</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#C8102E; --red-dark:#A50D26; --red-deep:#7C0A1D;
    --purple:#5B2D8E;
    --leader:#0B6FC2;
    --recruit:#E0242C;
    --ink:#15161B; --muted:#6E727E; --hair:#ECEDF0; --bg-soft:#F7F7F8;
    --c-blue:#54C2F0; --c-yellow:#FFC42E; --c-green:#8CC63F; --c-peach:#FFB27D;
    --sans:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg-soft); color:var(--ink); font-family:var(--sans);
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 螢幕工具列(列印隱藏) ── */
  .toolbar{
    position:sticky; top:0; z-index:10; background:#fff; border-bottom:1px solid var(--hair);
    padding:10px 18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .toolbar .tip{font-size:12.5px; color:var(--muted); margin-right:auto; line-height:1.5;}
  .tbtn{
    display:inline-flex; align-items:center; gap:6px; border:1.5px solid #DDDFE5; background:#fff;
    color:var(--ink); border-radius:999px; padding:8px 18px; font-size:13.5px; font-weight:700;
    cursor:pointer; text-decoration:none; font-family:inherit;
  }
  .tbtn:hover{border-color:var(--red); color:var(--red); background:#FDF3F5;}
  .tbtn-primary{background:var(--red); border-color:var(--red); color:#fff;}
  .tbtn-primary:hover{background:var(--red-dark); border-color:var(--red-dark); color:#fff;}

  /* ── A4 橫式海報 ── */
  .sheet{
    position:relative; width:297mm; min-height:210mm; margin:16px auto;
    background:#fff; padding:7mm 9mm 13mm;
    box-shadow:0 14px 40px -16px rgba(27,28,34,.28);
    overflow:hidden;
    display:flex; flex-direction:column;
  }
  /* 右下紅色斜帶(海報收尾) */
  .sheet::after{
    content:""; position:absolute; right:-60px; bottom:26px; width:420px; height:30px;
    background:linear-gradient(90deg, var(--red) 0%, var(--red-deep) 100%);
    transform:rotate(-7deg); border-radius:4px; pointer-events:none;
  }
  .sheet::before{
    content:""; position:absolute; right:-60px; bottom:60px; width:300px; height:7px;
    background:var(--red-100, #F3C4CD); background:#F3C4CD;
    transform:rotate(-7deg); border-radius:4px; pointer-events:none;
  }

  /* ── 海報標題 ── */
  .mast{position:relative; text-align:center; padding:2px 0 6px;}
  .mast-title{
    margin:0; font-weight:900; font-size:31px; line-height:1.25; letter-spacing:.045em;
    color:var(--purple); outline:none;
  }
  .mast-title .accent{color:var(--red);}
  .mast-title .count{color:var(--red);}
  .mast-date{
    position:absolute; right:2px; bottom:8px; font-size:11px; font-weight:800;
    color:var(--ink); letter-spacing:.06em; outline:none; font-variant-numeric:tabular-nums;
  }

  /* ── 12 組海報網格(6 欄 × 2 列) ── */
  .grid{
    flex:1; display:grid; grid-template-columns:repeat(6, 1fr);
    gap:calc(8px * var(--s, 1)) calc(9px * var(--s, 1));
    align-content:start; --s:1;
  }
  .g{min-width:0;}
  .g-h{
    background:var(--gc, var(--c-blue));
    border-radius:4px; padding:calc(2.5px * var(--s)) 4px;
    text-align:center; margin-bottom:calc(2.5px * var(--s));
    font-size:calc(10.2px * var(--s)); font-weight:900; letter-spacing:.01em;
    color:var(--ink); white-space:nowrap; overflow:hidden;
    box-shadow:0 1px 0 rgba(0,0,0,.12);
  }
  .g-list{list-style:none; margin:0; padding:0 1px;}
  .g-list li{
    display:flex; gap:calc(4px * var(--s)); align-items:baseline;
    font-size:calc(9.8px * var(--s)); line-height:1.42;
    padding:calc(0.6px * var(--s)) 0;
  }
  .n{flex:none; font-weight:800; letter-spacing:.03em; min-width:calc(42px * var(--s)); white-space:nowrap;}
  .sep{flex:none; color:#C4C7CE; font-weight:400;}
  .t{min-width:0; font-weight:500; color:#26272E;}
  /* 組長:藍字粗體(整列) */
  li.leader .n, li.leader .t{color:var(--leader); font-weight:900;}
  li.leader .sep{color:var(--leader);}
  /* 招募席位:紅字,無姓名、對齊專業別欄 */
  li.recruit{padding-left:calc(46px * var(--s));}
  li.recruit .t{color:var(--recruit); font-weight:700;}

  /* ── 頁尾(BNI 樣式 + QR) ── */
  .foot{
    position:relative; z-index:1; margin-top:6px; padding-top:5px;
    display:flex; align-items:flex-end; gap:12px;
  }
  .bni{display:flex; align-items:baseline; gap:8px;}
  .bni-logo{font-size:26px; font-weight:900; color:var(--red); letter-spacing:.02em; line-height:1;}
  .bni-sub{font-size:15px; font-weight:900; font-style:italic; color:var(--red-dark); letter-spacing:.06em;}
  .foot-region{font-size:11px; color:#8A8E99; font-weight:800; letter-spacing:.04em; outline:none;}
  .foot-qr{margin-left:auto; margin-right:44px; display:flex; align-items:center; gap:7px;}
  .foot-qr canvas{width:44px; height:44px; border:1px solid var(--hair); border-radius:5px; background:#fff;}
  .foot-qr span{font-size:7.4px; color:var(--muted); font-weight:700; letter-spacing:.12em; text-align:right; line-height:1.7;}

  [contenteditable]:hover, [contenteditable]:focus{background:#FDF3F5; border-radius:4px; outline:none;}

  @media print{
    body{background:#fff;}
    .toolbar{display:none !important;}
    .sheet{width:auto; min-height:0; margin:0; box-shadow:none; padding:0 0 2mm;}
    .sheet::after{right:-60px; bottom:20px;}
    @page{size:A4 landscape; margin:7mm 9mm 5mm;}
  }
  @media screen and (max-width:900px){
    .sheet{width:100%; min-height:0; padding:14px;}
    .grid{grid-template-columns:repeat(2, 1fr);}
    .mast-date{position:static; display:block; margin-top:4px;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="tip">標題與日期<b>點一下就能改字</b>;各組「招募席位」紅字項目在後台的分組欄位編輯。確認後按「列印/存 PDF」。</span>
  <a class="tbtn" href="admin.html">← 回後台</a>
  <a class="tbtn" href="./">回名錄</a>
  <button class="tbtn tbtn-primary" onclick="window.print()" type="button">🖨 列印/存 PDF</button>
</div>

<div class="sheet">
  <header class="mast">
    <h1 class="mast-title" id="mast-title" contenteditable="true" spellcheck="false"></h1>
    <div class="mast-date" id="sheet-date" contenteditable="true" spellcheck="false"></div>
  </header>
  <div class="grid" id="grid"></div>
  <footer class="foot">
    <div class="bni"><span class="bni-logo">BNI</span><span class="bni-sub">ACCELERATE</span></div>
    <div class="foot-region" contenteditable="true" spellcheck="false">投嘉雲彰區域/Nantou.Chiayi.Yunlin.Changhua/Taiwan</div>
    <div class="foot-qr">
      <span>掃描 QR<br>看完整名錄</span>
      <canvas id="foot-qr-canvas" width="176" height="176"></canvas>
    </div>
  </footer>
</div>

<script src="data.js"></script>
<script src="qrcode.js"></script>
<script>
(function(){
  "use strict";
  function esc(s){ return (s||"").replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  var total = GROUPS.reduce(function(n,g){ return n + g.members.length; }, 0);
  document.getElementById("mast-title").innerHTML =
    "雲榮鑽石分會<span class=\"accent\">成交破億</span>產業小組團隊<span class=\"count\">(" + total + ")</span>";
  var d = new Date(), pad = function(n){ return String(n).padStart(2,"0"); };
  document.getElementById("sheet-date").textContent = d.getFullYear() + " /" + pad(d.getMonth()+1) + "/" + pad(d.getDate());

  /* 各組帶色:A/B 藍、C/D 黃、E/F 綠、G/H/I 橘(依組別代號字首) */
  function groupColor(code){
    var ch = (code || "").trim().charAt(0).toUpperCase();
    if(ch === "A" || ch === "B") return "var(--c-blue)";
    if(ch === "C" || ch === "D") return "var(--c-yellow)";
    if(ch === "E" || ch === "F") return "var(--c-green)";
    return "var(--c-peach)";
  }

  var html = "";
  GROUPS.forEach(function(g){
    html += '<section class="g"><div class="g-h" style="--gc:' + groupColor(g.code) + '">' +
      esc(g.code || "") + "/" + esc(g.name || "") + "(" + g.members.length + ")</div><ul class=\"g-list\">";
    g.members.forEach(function(m){
      var isLeader = (g.leader || "").trim() && (m.name || "").trim() === (g.leader || "").trim();
      html += '<li class="' + (isLeader ? "leader" : "") + '"><span class="n">' + esc(m.name || "") +
        '</span><span class="sep">|</span><span class="t">' + esc(m.title || "") + "</span></li>";
    });
    (g.recruiting || []).forEach(function(r){
      html += '<li class="recruit"><span class="t">' + esc(r) + "</span></li>";
    });
    html += "</ul></section>";
  });
  document.getElementById("grid").innerHTML = html;

  /* 頁尾 QR:掃描直達名錄 */
  try{
    var qr = qrcode(0, "M");
    qr.addData("https://ivanzhong085.github.io/member-directory/");
    qr.make();
    var cv = document.getElementById("foot-qr-canvas");
    var ctx = cv.getContext("2d");
    var n = qr.getModuleCount(), quiet = 2, cell = cv.width / (n + quiet * 2);
    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = "#15161B";
    for(var r = 0; r < n; r++) for(var c = 0; c < n; c++)
      if(qr.isDark(r, c)) ctx.fillRect(quiet*cell + c*cell, quiet*cell + r*cell, Math.ceil(cell)+.3, Math.ceil(cell)+.3);
  }catch(e){ var fq = document.querySelector(".foot-qr"); if(fq) fq.style.display = "none"; }

  /* 自動縮放:塞不下縮小、太空放大填滿,永遠一頁 A4 橫式。
     頁尾被 flex 推在頁底,所以用「內容最低點與頁尾的空隙」判斷疏密。 */
  var grid = document.getElementById("grid");
  var sheet = document.querySelector(".sheet");
  var foot = document.querySelector(".foot");
  var scale = 1, guard = 0;
  var PAGE_H = Math.round(210 * 96 / 25.4);
  function sheetH(){ return sheet.getBoundingClientRect().height; }
  function gapPx(){
    var mx = 0;
    document.querySelectorAll(".g").forEach(function(e){
      var b = e.getBoundingClientRect().bottom;
      if(b > mx) mx = b;
    });
    return foot.getBoundingClientRect().top - mx;
  }
  function setScale(v){ scale = v; grid.style.setProperty("--s", scale.toFixed(2)); }
  function fit(){
    guard = 0; setScale(1);
    while(sheetH() > PAGE_H + 3 && scale > 0.6 && guard < 26){ setScale(scale - 0.03); guard++; }
    guard = 0;
    while(sheetH() <= PAGE_H + 3 && gapPx() > 40 && scale < 1.34 && guard < 30){ setScale(scale + 0.02); guard++; }
    if(sheetH() > PAGE_H + 3 && scale > 0.64) setScale(scale - 0.02);
  }
  fit();
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
})();
</script>
</body>
</html>
