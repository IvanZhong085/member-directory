<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產業小組表｜會員名錄</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#C8102E; --red-dark:#A50D26; --red-deep:#7C0A1D;
    --red-50:#FDF3F5; --red-100:#FAE4E8; --red-200:#F3C4CD;
    --ink:#1B1C22; --body:#3E414B; --muted:#787D89; --faint:#A6AAB4;
    --hair:#EEEFF2; --bg-soft:#F7F7F8;
    --sans:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
    --serif:"Noto Serif TC","Songti TC","PMingLiU",serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg-soft); color:var(--ink); font-family:var(--sans);
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 螢幕工具列(列印隱藏) ── */
  .toolbar{
    position:sticky; top:0; z-index:10; background:#fff; border-bottom:1px solid var(--hair);
    padding:10px 18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .toolbar .tip{font-size:12.5px; color:var(--muted); margin-right:auto; line-height:1.5;}
  .tbtn{
    display:inline-flex; align-items:center; gap:6px; border:1.5px solid #DDDFE5; background:#fff;
    color:var(--ink); border-radius:999px; padding:8px 18px; font-size:13.5px; font-weight:700;
    cursor:pointer; text-decoration:none; font-family:inherit;
  }
  .tbtn:hover{border-color:var(--red); color:var(--red); background:var(--red-50);}
  .tbtn-primary{background:var(--red); border-color:var(--red); color:#fff;}
  .tbtn-primary:hover{background:var(--red-dark); border-color:var(--red-dark); color:#fff;}

  /* ── A4 紙面 ── */
  .sheet{
    position:relative; width:210mm; min-height:297mm; margin:16px auto;
    background:#fff; padding:11mm 12mm 9mm;
    box-shadow:0 14px 40px -16px rgba(27,28,34,.28);
    background-image:radial-gradient(circle at 100% 0%, var(--red-50) 0%, rgba(253,243,245,0) 26%);
    display:flex; flex-direction:column;
  }
  .cols{flex:1;}

  /* ── 刊頭 ── */
  .mast{display:flex; align-items:flex-end; justify-content:space-between; gap:16px;}
  .mast-left{min-width:0;}
  .eyebrow{
    display:flex; align-items:center; gap:8px;
    font-size:8.2px; font-weight:800; letter-spacing:.34em; color:var(--red);
  }
  .eyebrow::before{content:""; width:22px; height:2px; background:var(--red);}
  .mast-title{
    margin:5px 0 0; font-family:var(--serif); font-weight:900;
    font-size:25px; line-height:1.22; letter-spacing:.035em; color:var(--ink); outline:none;
  }
  .mast-title .accent{color:var(--red);}
  .mast-title .count{
    font-family:var(--sans); font-size:14px; font-weight:900; color:var(--red);
    letter-spacing:.02em; margin-left:4px; vertical-align:2px;
  }
  .mast-meta{
    margin-top:6px; font-size:8.8px; color:var(--muted); font-weight:500;
    letter-spacing:.14em; display:flex; align-items:center; gap:8px; flex-wrap:wrap; outline:none;
  }
  .mast-meta .date{color:var(--red-dark); font-weight:800;}
  .mast-meta [contenteditable]{outline:none;}
  .mast-stats{
    flex:none; text-align:right; display:flex; gap:6px; padding-bottom:2px;
  }
  .stat-chip{
    border:1px solid var(--red-100); background:#fff; border-radius:8px;
    padding:5px 10px 4px; text-align:center; min-width:44px;
  }
  .stat-chip b{display:block; font-size:15px; font-weight:900; color:var(--red); line-height:1.1; font-variant-numeric:tabular-nums;}
  .stat-chip span{font-size:7.2px; font-weight:800; color:var(--muted); letter-spacing:.22em;}
  /* 雙分隔線:編輯刊物慣用的粗紅+細灰 */
  .rule{margin:9px 0 10px; border-top:2.5px solid var(--red); position:relative;}
  .rule::after{content:""; position:absolute; left:0; right:0; top:2px; border-top:1px solid var(--hair);}

  [contenteditable]:hover, [contenteditable]:focus{background:var(--red-50); border-radius:4px;}

  /* ── 三欄內容 ── */
  .cols{columns:3; column-gap:7mm; column-rule:1px solid var(--hair); --s:1;}
  .g{break-inside:avoid; margin-bottom:calc(9px * var(--s));}
  .g-h{
    display:flex; align-items:center; gap:6px;
    padding-bottom:calc(3px * var(--s)); margin-bottom:calc(3px * var(--s));
    border-bottom:2px solid var(--red);
  }
  .g-code{
    flex:none; min-width:calc(19px * var(--s)); height:calc(15.5px * var(--s)); padding:0 4px;
    background:var(--red); color:#fff; border-radius:4px;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:calc(9px * var(--s)); font-weight:900; letter-spacing:.04em;
  }
  .g-name{
    margin:0; font-size:calc(11.2px * var(--s)); font-weight:900; letter-spacing:.06em;
    color:var(--ink); flex:1; min-width:0; white-space:nowrap; overflow:hidden;
  }
  .g-count{
    flex:none; font-size:calc(8.2px * var(--s)); font-weight:800; color:var(--red);
    font-variant-numeric:tabular-nums; letter-spacing:.06em;
  }
  .g-list{list-style:none; margin:0; padding:0;}
  .g-list li{
    display:grid; grid-template-columns:calc(50px * var(--s)) 1fr; gap:calc(7px * var(--s));
    align-items:baseline; padding:calc(1.6px * var(--s)) 1px;
  }
  .g-list li:nth-child(even){background:#FCFCFD;}
  .n{
    font-size:calc(9.9px * var(--s)); font-weight:700; color:var(--ink);
    letter-spacing:.05em; white-space:nowrap;
  }
  .t{
    font-size:calc(9.3px * var(--s)); font-weight:450; color:var(--body);
    line-height:1.35; min-width:0;
    border-left:1px solid var(--red-200); padding-left:calc(7px * var(--s));
  }

  /* ── 頁尾 ── */
  .foot{
    margin-top:10px; padding-top:8px; border-top:1px solid var(--hair);
    display:flex; align-items:center; gap:12px;
  }
  .foot-mark{
    width:20px; height:20px; border-radius:6px; flex:none;
    background:linear-gradient(135deg,var(--red),var(--red-deep)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:900;
  }
  .foot-text{font-size:8px; color:var(--muted); font-weight:600; letter-spacing:.1em; line-height:1.6;}
  .foot-text b{color:var(--ink); letter-spacing:.06em;}
  .foot-qr{margin-left:auto; display:flex; align-items:center; gap:7px;}
  .foot-qr canvas{width:46px; height:46px; border:1px solid var(--hair); border-radius:6px;}
  .foot-qr span{font-size:7.6px; color:var(--muted); font-weight:700; letter-spacing:.14em; text-align:right; line-height:1.7;}

  @media print{
    body{background:#fff;}
    .toolbar{display:none !important;}
    .sheet{width:auto; min-height:0; margin:0; padding:0 0 18mm; box-shadow:none; display:block;}
    .foot{position:fixed; bottom:0; left:0; right:0; background:#fff;}
    @page{size:A4 portrait; margin:10mm 11mm 8mm;}
  }
  @media screen and (max-width:820px){
    .sheet{width:100%; min-height:0; padding:16px;}
    .cols{columns:1;}
    .mast{flex-direction:column; align-items:flex-start;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="tip">標題與日期<b>點一下就能改字</b>;確認後按「列印/存 PDF」,在列印視窗選「儲存為 PDF」。</span>
  <a class="tbtn" href="admin.html">← 回後台</a>
  <a class="tbtn" href="./">回名錄</a>
  <button class="tbtn tbtn-primary" onclick="window.print()" type="button">🖨 列印/存 PDF</button>
</div>

<div class="sheet">
  <header class="mast">
    <div class="mast-left">
      <div class="eyebrow">MEMBER DIRECTORY・INDUSTRY GROUP TEAM</div>
      <h1 class="mast-title" id="mast-title" contenteditable="true" spellcheck="false"></h1>
      <div class="mast-meta">
        <span contenteditable="true" spellcheck="false">投嘉雲彰區域 NANTOU・CHIAYI・YUNLIN・CHANGHUA</span>
        <span class="date" id="sheet-date" contenteditable="true" spellcheck="false"></span>
      </div>
    </div>
    <div class="mast-stats">
      <div class="stat-chip"><b id="stat-groups">—</b><span>專業分組</span></div>
      <div class="stat-chip"><b id="stat-members">—</b><span>位成員</span></div>
    </div>
  </header>
  <div class="rule"></div>
  <div class="cols" id="cols"></div>
  <footer class="foot">
    <div class="foot-mark">會</div>
    <div class="foot-text"><b>會員名錄</b>・本表由名錄網站自動產生,資料即時同步<br>ivanzhong085.github.io/member-directory</div>
    <div class="foot-qr">
      <span>掃描 QR<br>看完整名錄</span>
      <canvas id="foot-qr-canvas" width="184" height="184"></canvas>
    </div>
  </footer>
</div>

<script src="data.js"></script>
<script src="qrcode.js"></script>
<script>
(function(){
  "use strict";
  function esc(s){ return (s||"").replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  var total = GROUPS.reduce(function(n,g){ return n + g.members.length; }, 0);
  document.getElementById("mast-title").innerHTML =
    "雲榮鑽石分會<span class=\"accent\">成交破億</span>產業小組團隊<span class=\"count\">(" + total + ")</span>";
  var d = new Date(), pad = function(n){ return String(n).padStart(2,"0"); };
  document.getElementById("sheet-date").textContent = d.getFullYear() + "." + pad(d.getMonth()+1) + "." + pad(d.getDate());
  document.getElementById("stat-groups").textContent = GROUPS.length;
  document.getElementById("stat-members").textContent = total;

  var html = "";
  GROUPS.forEach(function(g){
    html += '<section class="g"><header class="g-h">' +
      '<span class="g-code">' + esc(g.code || "") + '</span>' +
      '<h2 class="g-name">' + esc(g.name || "") + '</h2>' +
      '<span class="g-count">' + g.members.length + ' 位</span></header><ul class="g-list">';
    g.members.forEach(function(m){
      html += '<li><span class="n">' + esc(m.name || "") + '</span><span class="t">' + esc(m.title || "") + "</span></li>";
    });
    html += "</ul></section>";
  });
  document.getElementById("cols").innerHTML = html;

  /* 頁尾 QR:掃描直達名錄網站 */
  try{
    var qr = qrcode(0, "M");
    qr.addData("https://ivanzhong085.github.io/member-directory/");
    qr.make();
    var cv = document.getElementById("foot-qr-canvas");
    var ctx = cv.getContext("2d");
    var n = qr.getModuleCount(), quiet = 2, cell = cv.width / (n + quiet * 2);
    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = "#1B1C22";
    for(var r = 0; r < n; r++) for(var c = 0; c < n; c++)
      if(qr.isDark(r, c)) ctx.fillRect(quiet*cell + c*cell, quiet*cell + r*cell, Math.ceil(cell)+.3, Math.ceil(cell)+.3);
  }catch(e){ var fq = document.querySelector(".foot-qr"); if(fq) fq.style.display = "none"; }

  /* 自動縮放到一頁 A4(成員成長也不爆頁;下限 66%) */
  var A4H = Math.round(297 * 96 / 25.4);
  var cols = document.getElementById("cols");
  var sheet = document.querySelector(".sheet");
  var foot = document.querySelector(".foot");
  var scale = 1, guard = 0;
  function bottomPx(){
    return foot.getBoundingClientRect().bottom - sheet.getBoundingClientRect().top + 9 * 96 / 25.4;
  }
  function setScale(v){ scale = v; cols.style.setProperty("--s", scale.toFixed(2)); }
  function fit(){
    guard = 0;
    setScale(1);
    while(bottomPx() > A4H && scale > 0.66 && guard < 24){ setScale(scale - 0.03); guard++; }
    /* 塞得下且頁尾離底部還很遠 → 放大填滿(排版才不會頭重腳輕) */
    guard = 0;
    while(scale >= 1 && bottomPx() < A4H - 46 && scale < 1.24 && guard < 24){ setScale(scale + 0.02); guard++; }
    if(bottomPx() > A4H && scale > 1) setScale(scale - 0.02);   // 放大過頭退一步
  }
  fit();
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(fit);   // 字型載入後再量一次
})();
</script>
</body>
</html>
